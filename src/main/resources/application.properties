server.port=8048
spring.application.name=AgentCore

# PostgreSQL（Docker 环境通过环境变量覆盖）
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:AgentSQL}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:15997737ZY}
spring.datasource.driver-class-name=org.postgresql.Driver

# MyBatis-Plus
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# SpringDoc & Knife4j
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
knife4j.enable=true

# DeepSeek LLM
llm.deepseek.api-key=sk-b73438d97ef84c79b70f9e226e86096c
llm.deepseek.url=${DEEPSEEK_URL:https://api.deepseek.com/v1/chat/completions}
llm.deepseek.model=${DEEPSEEK_MODEL:deepseek-chat}
agent.embedding.dimension=1536
agent.embedding.top-k=5

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.listener.simple.acknowledge-mode=manual
spring.rabbitmq.listener.simple.prefetch=1
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=3000
