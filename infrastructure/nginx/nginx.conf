events {}

http {
    upstream user_service {
        server user-service:8001;
    }

    upstream agent_service {
        server agent-service:8002;
    }

    upstream resource_service {
        server resource-service:8003;
    }

    upstream evaluation_service {
        server evaluation-service:8004;
    }

    upstream teacher_service {
        server teacher-service:8005;
    }

    upstream system_service {
        server system-service:8006;
    }

    server {
        listen 80;

        location /api/users/ {
            proxy_pass http://user_service/;
        }

        location /api/agents/ {
            proxy_pass http://agent_service/;
        }

        location /api/resources/ {
            proxy_pass http://resource_service/;
        }

        location /api/evaluations/ {
            proxy_pass http://evaluation_service/;
        }

        location /api/teachers/ {
            proxy_pass http://teacher_service/;
        }

        location /api/system/ {
            proxy_pass http://system_service/;
        }
    }
}
