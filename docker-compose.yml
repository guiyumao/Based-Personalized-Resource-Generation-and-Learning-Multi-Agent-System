# ============================================================
# AgentCore + 依赖服务
# 队友使用：docker compose up -d 一键启动全部服务
# ============================================================

services:
  agent-core:
    build: .
    container_name: agent-core
    ports:
      - "8048:8048"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    restart: unless-stopped
    networks:
      - agent-network

  postgres:
    image: postgres:16-alpine
    container_name: agent-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: AgentSQL
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-15997737ZY}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./src/main/resources/data-test.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d AgentSQL"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - agent-network

  redis:
    image: redis:7-alpine
    container_name: agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - agent-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: agent-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - agent-network

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:

networks:
  agent-network:
    driver: bridge
