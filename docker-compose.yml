version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: learning-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2
    container_name: learning-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: learning-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"

  neo4j:
    image: neo4j:5
    container_name: learning-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  minio:
    image: minio/minio:latest
    container_name: learning-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: learning-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  chroma:
    image: chromadb/chroma:0.5.5
    container_name: learning-chroma
    restart: unless-stopped
    ports:
      - "8010:8000"
    volumes:
      - chroma_data:/chroma/chroma

  user-service:
    image: python:3.11-slim
    container_name: learning-user-service
    working_dir: /app
    command: sh -c "pip install -e . && uvicorn services.user_service.app.main:app --host 0.0.0.0 --port 8001"
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - redis

  agent-service:
    image: python:3.11-slim
    container_name: learning-agent-service
    working_dir: /app
    command: sh -c "pip install -e . && uvicorn services.agent_service.app.main:app --host 0.0.0.0 --port 8002"
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8002:8002"
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - neo4j
      - chroma

  resource-service:
    build:
      context: .
      dockerfile: services/resource_service/Dockerfile
    container_name: learning-resource-service
    working_dir: /app
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8003:8003"
    depends_on:
      - postgres
      - minio

  evaluation-service:
    build:
      context: .
      dockerfile: services/evaluation_service/Dockerfile
    container_name: learning-evaluation-service
    working_dir: /app
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8004:8004"
    depends_on:
      - postgres
      - redis

  teacher-service:
    build:
      context: .
      dockerfile: services/teacher_service/Dockerfile
    container_name: learning-teacher-service
    working_dir: /app
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8005:8005"
    depends_on:
      - postgres
      - redis

  system-service:
    build:
      context: .
      dockerfile: services/system_service/Dockerfile
    container_name: learning-system-service
    working_dir: /app
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8006:8006"
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:1.27-alpine
    container_name: learning-nginx
    restart: unless-stopped
    depends_on:
      - user-service
      - agent-service
      - resource-service
      - evaluation-service
      - teacher-service
      - system-service
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  neo4j_data:
  minio_data:
  es_data:
  chroma_data:
